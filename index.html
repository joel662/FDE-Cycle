<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>FDE Steampunk Workshop — AR</title>
  <link rel="stylesheet" href="styles.css">
  <!-- AR / 3D core -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- P2P -->
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <!-- Game modules (order matters) -->
  <script src="audio.js"></script>
  <script src="textures.js"></script>
  <script src="gamestate.js"></script>
  <script src="gameplay.js"></script>
</head>
<body>

<!-- ── OVERLAYS ─────────────────────────────────────────────────── -->
<div id="heat-vignette"></div>

<div id="shake-indicator">
  <p>🔧 &nbsp;SHAKE THE PHONE!&nbsp; 🔧</p>
  <div id="shake-bar-bg"><div id="shake-progress"></div></div>
</div>

<!-- ── HUD ──────────────────────────────────────────────────────── -->
<div id="hud">
  <div id="hud-top">
    <span>⚙</span>
    <span id="hud-clock">0 Hz</span>
    <div id="heat-wrap">
      <span>🔥</span>
      <div id="heat-wrap-bg"><div id="hud-heat-bar"></div></div>
    </div>
    <span id="hud-queue">▶ Render Frame 1</span>
  </div>
  <div id="crosshair">⊕</div>
  <div id="hud-bottom">
    <div class="inv-slot" id="slot-0" onclick="dropItem(0)" title="Slot 0"></div>
    <div class="inv-slot" id="slot-1" onclick="dropItem(1)" title="Slot 1" style="display:none"></div>
    <div class="inv-slot" id="slot-2" onclick="dropItem(2)" title="Slot 2" style="display:none"></div>
  </div>
</div>

<!-- ── ACTION BUTTONS ───────────────────────────────────────────── -->
<div id="action-panel">
  <button class="action-btn" id="btn-fetch"     onclick="doFetch()">⬆ FETCH</button>
  <button class="action-btn" id="btn-decode"    onclick="doDecode()">🔧 DECODE</button>
  <button class="action-btn" id="btn-load"      onclick="doLoad()">📁 LOAD DATA</button>
  <button class="action-btn" id="btn-execute"   onclick="doExecute()">⚡ EXECUTE</button>
  <button class="action-btn" id="btn-writeback" onclick="doWriteback()">💾 WRITE BACK</button>
  <button class="action-btn" id="btn-ram"       onclick="doRAMFetch()">🗄 RAM FETCH</button>
  <!-- Desktop shake fallback -->
  <button class="action-btn" id="btn-shake" onclick="simulateShake()"
    style="display:block;background:#111;color:#888;border-color:#444;font-size:13px;padding:8px 18px;">
    [TAP TO SHAKE — no accel]
  </button>
</div>

<!-- ── TOP-LEFT PANEL ───────────────────────────────────────────── -->
<div id="ui-top-left">
  <div id="room-info">Connecting…</div>
  <button id="copy-btn" style="display:none" onclick="copyLink()">Copy Invite Link</button>
</div>
<div id="log-panel"></div>

<!-- ════════════════════════════════════════════════════════════════
     AR SCENE
     Marker 0 → Conveyor Belt (Fetch)
     Marker 1 → Dispatch Desk  (Decode)
     Marker 2 → Register File  (Load / Write-Back)
     Marker 3 → ALU Forge      (Execute)
     Marker 4 → RAM Cabinet    (Cache-Miss Fetch)
     ════════════════════════════════════════════════════════════════ -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true;">

  <!-- ── MARKER 0 · CONVEYOR BELT (FETCH) ── -->
  <a-marker type="barcode" value="0" id="mk-conveyor" smooth="true" smoothCount="5">
    <!-- Frame -->
    <a-box width="1.85" height="0.05" depth="0.55" position="0 0.22 0"
      material="color:#2e1c0a;metalness:0.85;roughness:0.25"></a-box>
    <!-- Rails -->
    <a-box width="1.9" height="0.07" depth="0.055" position="0 0.17 0.25" material="color:#7c5a1e;metalness:0.9"></a-box>
    <a-box width="1.9" height="0.07" depth="0.055" position="0 0.17 -0.25" material="color:#7c5a1e;metalness:0.9"></a-box>
    <!-- Legs -->
    <a-box width="0.05" height="0.28" depth="0.05" position="-0.88 0.06 0.24" material="color:#5a3a10;metalness:0.7"></a-box>
    <a-box width="0.05" height="0.28" depth="0.05" position="0.88 0.06 0.24"  material="color:#5a3a10;metalness:0.7"></a-box>
    <a-box width="0.05" height="0.28" depth="0.05" position="-0.88 0.06 -0.24" material="color:#5a3a10;metalness:0.7"></a-box>
    <a-box width="0.05" height="0.28" depth="0.05" position="0.88 0.06 -0.24"  material="color:#5a3a10;metalness:0.7"></a-box>
    <!-- Steam pipe -->
    <a-cylinder radius="0.035" height="1.85" position="0 0.44 -0.25" rotation="0 0 90"
      material="color:#999;metalness:1;roughness:0.15"></a-cylinder>
    <!-- Rollers -->
    <a-cylinder radius="0.035" height="0.5" position="-0.88 0.22 0" rotation="0 90 0"
      material="color:#888;metalness:0.9"></a-cylinder>
    <a-cylinder radius="0.035" height="0.5" position="0.88 0.22 0" rotation="0 90 0"
      material="color:#888;metalness:0.9"></a-cylinder>
    <!-- Label -->
    <a-text value="INSTRUCTION QUEUE" position="0 0.42 0.2" rotation="-90 0 0"
      align="center" color="#e8c97a" width="1.1"></a-text>
    <!-- Belt chip (Data Block) -->
    <a-entity id="belt-chip" visible="false" position="-0.7 0.3 0">
      <a-box width="0.34" height="0.1" depth="0.24"
        material="color:#3e2208;metalness:0.75;roughness:0.35"></a-box>
      <a-box width="0.26" height="0.015" depth="0.17" position="0 0.057 0"
        material="color:#120a02;metalness:0.3"></a-box>
      <a-image id="chip-img" width="0.24" height="0.15" position="0 0.063 0" rotation="-90 0 0"></a-image>
    </a-entity>
  </a-marker>

  <!-- ── MARKER 1 · DISPATCH DESK (DECODE) ── -->
  <a-marker type="barcode" value="1" id="mk-dispatch" smooth="true" smoothCount="5">
    <!-- Desk top -->
    <a-box width="1.5" height="0.1" depth="1.0" position="0 0.17 0"
      material="color:#2e1808;metalness:0.65;roughness:0.45"></a-box>
    <!-- Legs -->
    <a-box width="0.09" height="0.34" depth="0.09" position="-0.68 0 -0.42" material="color:#1e0f04;metalness:0.8"></a-box>
    <a-box width="0.09" height="0.34" depth="0.09" position="0.68 0 -0.42"  material="color:#1e0f04;metalness:0.8"></a-box>
    <a-box width="0.09" height="0.34" depth="0.09" position="-0.68 0 0.42"  material="color:#1e0f04;metalness:0.8"></a-box>
    <a-box width="0.09" height="0.34" depth="0.09" position="0.68 0 0.42"   material="color:#1e0f04;metalness:0.8"></a-box>
    <!-- Pneumatic tubes (3) -->
    <a-cylinder radius="0.05" height="0.55" position="-0.42 0.5 -0.22" material="color:#aaa;metalness:1"></a-cylinder>
    <a-cylinder radius="0.05" height="0.55" position="0 0.5 -0.22"    material="color:#aaa;metalness:1"></a-cylinder>
    <a-cylinder radius="0.05" height="0.55" position="0.42 0.5 -0.22"  material="color:#aaa;metalness:1"></a-cylinder>
    <!-- Input tray (recessed slot) -->
    <a-box width="0.38" height="0.02" depth="0.38" position="0 0.23 0.14"
      material="color:#1a0f04;emissive:#ff8c00;emissiveIntensity:0.25"></a-box>
    <!-- Label -->
    <a-text value="DISPATCH DESK" position="0 0.3 0.52" rotation="-90 0 0"
      align="center" color="#e8c97a" width="1.4"></a-text>
    <a-text value="DROP + SHAKE" position="0 0.22 0.52" rotation="-90 0 0"
      align="center" color="#aa7733" width="1.0"></a-text>
    <!-- Data block placed on desk -->
    <a-entity id="dispatch-block" visible="false" position="0 0.3 0.14">
      <a-box width="0.34" height="0.1" depth="0.24"
        material="color:#3e2208;metalness:0.75;roughness:0.35"></a-box>
      <a-image id="dispatch-img" width="0.24" height="0.15" position="0 0.06 0" rotation="-90 0 0"></a-image>
    </a-entity>
  </a-marker>

  <!-- ── MARKER 2 · REGISTER FILE (LOAD / WRITE-BACK) ── -->
  <a-marker type="barcode" value="2" id="mk-registers" smooth="true" smoothCount="5">
    <!-- Back panel -->
    <a-box width="1.65" height="0.52" depth="0.07" position="0 0.36 -0.42"
      material="color:#2e1808;metalness:0.65;roughness:0.45"></a-box>
    <!-- Base -->
    <a-box width="1.65" height="0.06" depth="0.56" position="0 0.04 0"
      material="color:#1e0f04;metalness:0.8"></a-box>
    <!-- Label -->
    <a-text value="REGISTER FILE" position="0 0.65 -0.42" rotation="-90 0 0"
      align="center" color="#ffd700" width="1.5"></a-text>
    <!-- Cubby R0 -->
    <a-entity id="cubby-R0" position="-0.64 0.27 0">
      <a-box width="0.26" height="0.24" depth="0.46" material="color:#3e2010;metalness:0.7"></a-box>
      <a-text value="R0" position="0 0.15 -0.15" rotation="-90 0 180" align="center" color="#e8c97a" width="1.2"></a-text>
      <a-text id="val-R0" value="042" position="0 0.12 0.05" rotation="-90 0 0" align="center" color="#44ff88" width="1.5"></a-text>
    </a-entity>
    <!-- Cubby R1 -->
    <a-entity id="cubby-R1" position="-0.32 0.27 0">
      <a-box width="0.26" height="0.24" depth="0.46" material="color:#3e2010;metalness:0.7"></a-box>
      <a-text value="R1" position="0 0.15 -0.15" rotation="-90 0 180" align="center" color="#e8c97a" width="1.2"></a-text>
      <a-text id="val-R1" value="017" position="0 0.12 0.05" rotation="-90 0 0" align="center" color="#44ff88" width="1.5"></a-text>
    </a-entity>
    <!-- Cubby R2 -->
    <a-entity id="cubby-R2" position="0 0.27 0">
      <a-box width="0.26" height="0.24" depth="0.46" material="color:#3e2010;metalness:0.7"></a-box>
      <a-text value="R2" position="0 0.15 -0.15" rotation="-90 0 180" align="center" color="#e8c97a" width="1.2"></a-text>
      <a-text id="val-R2" value="099" position="0 0.12 0.05" rotation="-90 0 0" align="center" color="#44ff88" width="1.5"></a-text>
    </a-entity>
    <!-- Cubby R3 -->
    <a-entity id="cubby-R3" position="0.32 0.27 0">
      <a-box width="0.26" height="0.24" depth="0.46" material="color:#3e2010;metalness:0.7"></a-box>
      <a-text value="R3" position="0 0.15 -0.15" rotation="-90 0 180" align="center" color="#e8c97a" width="1.2"></a-text>
      <a-text id="val-R3" value="000" position="0 0.12 0.05" rotation="-90 0 0" align="center" color="#44ff88" width="1.5"></a-text>
    </a-entity>
    <!-- Cubby R4 -->
    <a-entity id="cubby-R4" position="0.64 0.27 0">
      <a-box width="0.26" height="0.24" depth="0.46" material="color:#3e2010;metalness:0.7"></a-box>
      <a-text value="R4" position="0 0.15 -0.15" rotation="-90 0 180" align="center" color="#e8c97a" width="1.2"></a-text>
      <a-text id="val-R4" value="000" position="0 0.12 0.05" rotation="-90 0 0" align="center" color="#44ff88" width="1.5"></a-text>
    </a-entity>
  </a-marker>

  <!-- ── MARKER 3 · ALU FORGE (EXECUTE) ── -->
  <a-marker type="barcode" value="3" id="mk-alu" smooth="true" smoothCount="5">
    <!-- Forge outer shell -->
    <a-box width="1.1" height="0.55" depth="0.9" position="0 0.32 0"
      material="color:#1e0f04;metalness:0.9;roughness:0.2"></a-box>
    <!-- Fire chamber -->
    <a-box id="forge-fire" width="0.65" height="0.24" depth="0.5" position="0 0.3 0"
      material="color:#ff3300;emissive:#ff2200;emissiveIntensity:0.8"></a-box>
    <!-- Chimneys -->
    <a-cylinder radius="0.07" height="0.5" position="-0.35 0.83 -0.25" material="color:#2a2a2a;metalness:0.95"></a-cylinder>
    <a-cylinder radius="0.07" height="0.5" position="0.35 0.83 -0.25"  material="color:#2a2a2a;metalness:0.95"></a-cylinder>
    <!-- Smoke caps -->
    <a-cylinder radius="0.1" height="0.04" position="-0.35 1.08 -0.25" material="color:#1a1a1a;metalness:0.9"></a-cylinder>
    <a-cylinder radius="0.1" height="0.04" position="0.35 1.08 -0.25"  material="color:#1a1a1a;metalness:0.9"></a-cylinder>
    <!-- Input slots (ticket + data) -->
    <a-box width="0.32" height="0.03" depth="0.25" position="-0.28 0.6 0.12"
      material="color:#1a0f04;emissive:#ff8c00;emissiveIntensity:0.35"></a-box>
    <a-box width="0.32" height="0.03" depth="0.25" position="0.28 0.6 0.12"
      material="color:#1a0f04;emissive:#4488ff;emissiveIntensity:0.35"></a-box>
    <a-text value="TICKET" position="-0.28 0.64 0.28" rotation="-90 0 0" align="center" color="#ff8844" width="0.8"></a-text>
    <a-text value="DATA" position="0.28 0.64 0.28" rotation="-90 0 0" align="center" color="#4488ff" width="0.8"></a-text>
    <!-- Output anvil -->
    <a-box width="0.55" height="0.06" depth="0.44" position="0 0.6 -0.22"
      material="color:#555;metalness:1;roughness:0.05"></a-box>
    <!-- Label -->
    <a-text value="ALU FORGE" position="0 0.72 0.48" rotation="-90 0 0" align="center" color="#ffd700" width="2.0"></a-text>
    <!-- Result block (appears on anvil) -->
    <a-entity id="forge-result" visible="false" position="0 0.66 -0.16">
      <a-box width="0.34" height="0.1" depth="0.24"
        material="color:#3e2208;metalness:0.75;roughness:0.35"></a-box>
      <a-image id="result-img" width="0.24" height="0.15" position="0 0.057 0" rotation="-90 0 0"></a-image>
    </a-entity>
  </a-marker>

  <!-- ── MARKER 4 · RAM CABINET (LONG-HAUL FETCH) ── -->
  <a-marker type="barcode" value="4" id="mk-ram" smooth="true" smoothCount="5">
    <!-- Cabinet body -->
    <a-box width="1.25" height="1.3" depth="0.65" position="0 0.7 0"
      material="color:#2e1c0a;metalness:0.45;roughness:0.85"></a-box>
    <!-- Rust patches -->
    <a-box width="0.32" height="0.22" depth="0.01" position="-0.3 0.5 0.33"
      material="color:#5a2c0a;roughness:1;metalness:0"></a-box>
    <a-box width="0.22" height="0.3" depth="0.01" position="0.42 0.95 0.33"
      material="color:#4a1a00;roughness:1;metalness:0"></a-box>
    <!-- 4 Drawer fronts -->
    <a-box width="0.85" height="0.22" depth="0.03" position="0 1.0 0.34"
      material="color:#3e2010;metalness:0.7;roughness:0.5"></a-box>
    <a-box width="0.85" height="0.22" depth="0.03" position="0 0.78 0.34"
      material="color:#3e2010;metalness:0.7;roughness:0.5"></a-box>
    <a-box width="0.85" height="0.22" depth="0.03" position="0 0.56 0.34"
      material="color:#3e2010;metalness:0.7;roughness:0.5"></a-box>
    <a-box width="0.85" height="0.22" depth="0.03" position="0 0.34 0.34"
      material="color:#3e2010;metalness:0.7;roughness:0.5"></a-box>
    <!-- Drawer handles -->
    <a-box width="0.35" height="0.03" depth="0.035" position="0 1.02 0.365" material="color:#aa8833;metalness:0.9"></a-box>
    <a-box width="0.35" height="0.03" depth="0.035" position="0 0.80 0.365" material="color:#aa8833;metalness:0.9"></a-box>
    <a-box width="0.35" height="0.03" depth="0.035" position="0 0.58 0.365" material="color:#aa8833;metalness:0.9"></a-box>
    <a-box width="0.35" height="0.03" depth="0.035" position="0 0.36 0.365" material="color:#aa8833;metalness:0.9"></a-box>
    <!-- Labels -->
    <a-text value="MAIN MEMORY" position="0 1.42 0.34" rotation="-90 0 0" align="center" color="#ff7744" width="1.6"></a-text>
    <a-text value="RAM" position="0 1.28 0.34" rotation="-90 0 0" align="center" color="#ff4400" width="2.4"></a-text>
    <a-text value="SLOW ACCESS ×2" position="0 1.17 0.34" rotation="-90 0 0" align="center" color="#aa5533" width="1.2"></a-text>
    <!-- Result block (appears after RAM fetch) -->
    <a-entity id="ram-result" visible="false" position="0 1.44 0.1">
      <a-box width="0.34" height="0.1" depth="0.24"
        material="color:#3e2208;metalness:0.75;roughness:0.35"></a-box>
      <a-image id="ram-img" width="0.24" height="0.15" position="0 0.057 0" rotation="-90 0 0"></a-image>
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

</body>
</html>
